# 智能数据分析Agent Docker Compose配置

version: '3.8'

services:
  # 主应用
  smart-data-agent:
    build: .
    container_name: smart_data_agent
    ports:
      - "8501:8501"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LOG_LEVEL=INFO
      - DEBUG=false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 可选：ChromaDB向量数据库（用于长期记忆）
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma_db:/chroma/chroma/.chromadb
    restart: unless-stopped

networks:
  default:
    name: smart_data_agent_network
